services:
  db:
    image: mysql:8.0
    container_name: lcgf_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lcgf_net

  wordpress:
    image: wordpress:6.6-php8.2-apache
    container_name: lcgf_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    # Setup completo all'avvio (i bind ./wp-content nested non si propagano sotto Coolify):
    # 1. Config PHP per upload grandi (128MB)
    # 2. Scarica tema child + mu-plugins dal repo GitHub pubblico
    # 3. Fix permessi www-data
    command:
      - bash
      - -c
      - |
        set -e
        # PHP config
        cat > /usr/local/etc/php/conf.d/uploads.ini <<'PHPEOF'
        file_uploads = On
        memory_limit = 512M
        upload_max_filesize = 128M
        post_max_size = 128M
        max_execution_time = 300
        max_input_time = 300
        max_input_vars = 5000
        PHPEOF
        # Scarica tema via git clone (bypass cache GitHub tarball)
        apt-get update -qq && apt-get install -y -qq git
        cd /tmp
        rm -rf lcgf-repo
        git clone --depth 1 --branch master https://github.com/emcdigitalsolutions/lacompagniadelglutenfree-wp.git lcgf-repo
        mkdir -p /var/www/html/wp-content/themes
        rm -rf /var/www/html/wp-content/themes/lcgf-child
        cp -r lcgf-repo/wp-content/themes/lcgf-child /var/www/html/wp-content/themes/
        # Copia scripts utility (translate, cmplz, ecc.) accessibili via wp eval-file
        mkdir -p /var/www/html/lcgf-scripts
        cp -r lcgf-repo/scripts/* /var/www/html/lcgf-scripts/ 2>/dev/null || true
        ls -la /var/www/html/wp-content/themes/lcgf-child/ > /var/www/html/lcgf-files.txt
        ls -la /var/www/html/wp-content/themes/lcgf-child/woocommerce/ >> /var/www/html/lcgf-files.txt 2>&1
        chmod 644 /var/www/html/lcgf-files.txt
        rm -rf /tmp/lcgf-repo
        # Rimuovi mu-plugin duplicato (se presente da deploy precedenti)
        rm -f /var/www/html/wp-content/mu-plugins/lcgf-bootstrap.php
        # Permessi
        mkdir -p /var/www/html/wp-content/uploads
        chown -R www-data:www-data /var/www/html/wp-content
        chmod -R u+rwX,g+rwX /var/www/html/wp-content
        # Installa WP-CLI
        if [ ! -f /usr/local/bin/wp ]; then
          curl -sLo /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x /usr/local/bin/wp
        fi
        # Auto-fix in background dopo l'avvio (WP deve essere up)
        (
          sleep 12
          cd /var/www/html
          # disabilita coming soon
          # Attiva tema child + imposta home statica + disabilita Coming Soon
          su -s /bin/bash www-data -c "wp theme activate lcgf-child" 2>&1 | tail -3 || true
          su -s /bin/bash www-data -c "wp option update woocommerce_coming_soon no" 2>&1 | tail -3 || true
          su -s /bin/bash www-data -c "wp option update woocommerce_store_pages_only no" 2>&1 | tail -3 || true
          su -s /bin/bash www-data -c "wp option update blog_public 1" 2>&1 | tail -3 || true
          # imposta come front-page la home con front-page.php (show_on_front=posts ma il template front-page.php prende priorità)
          su -s /bin/bash www-data -c "wp option update show_on_front posts" 2>&1 | tail -3 || true
          # Elimina pagina/articoli di default (escape $$ per docker-compose)
          PAGE_ID=$$(su -s /bin/bash www-data -c "wp post list --post_type=page --name=pagina-di-esempio --field=ID" 2>/dev/null)
          if [ -n "$$PAGE_ID" ]; then su -s /bin/bash www-data -c "wp post delete $$PAGE_ID --force" 2>&1 | tail -1 || true; fi
          POST_IDS=$$(su -s /bin/bash www-data -c "wp post list --post_type=post --field=ID" 2>/dev/null)
          for pid in $$POST_IDS; do
            su -s /bin/bash www-data -c "wp post delete $$pid --force" 2>&1 | tail -1 || true
          done
          # Assicura immagine per ogni prodotto (idempotente)
          for slug in box-family pinsa-romana pan-focaccia focaccia-rotonda base-pizza pane-filoncino pane-rosetta brioche crostate biscotti tiramisu cheesecake; do
            PID=$$(su -s /bin/bash www-data -c "wp post list --post_type=product --name=$$slug --field=ID" 2>/dev/null)
            if [ -n "$$PID" ]; then
              HAS_IMG=$$(su -s /bin/bash www-data -c "wp post meta get $$PID _thumbnail_id" 2>/dev/null)
              if [ -z "$$HAS_IMG" ]; then
                IMGFILE="/var/www/html/wp-content/themes/lcgf-child/assets/products/$$slug.png"
                if [ -f "$$IMGFILE" ]; then
                  su -s /bin/bash www-data -c "wp media import $$IMGFILE --post_id=$$PID --featured_image" 2>&1 | tail -1 || true
                fi
              fi
            fi
          done
          # Cornetto ha slug 'cornetto-vuoto' ma immagine 'cornetto.png'
          PID=$$(su -s /bin/bash www-data -c "wp post list --post_type=product --name=cornetto-vuoto --field=ID" 2>/dev/null)
          if [ -n "$$PID" ]; then
            HAS_IMG=$$(su -s /bin/bash www-data -c "wp post meta get $$PID _thumbnail_id" 2>/dev/null)
            if [ -z "$$HAS_IMG" ] && [ -f /var/www/html/wp-content/themes/lcgf-child/assets/products/cornetto.png ]; then
              su -s /bin/bash www-data -c "wp media import /var/www/html/wp-content/themes/lcgf-child/assets/products/cornetto.png --post_id=$$PID --featured_image" 2>&1 | tail -1 || true
            fi
          fi
          # Assegna template custom alle pagine
          for slug_tpl in "chi-siamo:page-chi-siamo.php" "contatti:page-contatti.php"; do
            slug=$${slug_tpl%:*}
            tpl=$${slug_tpl#*:}
            PID=$$(su -s /bin/bash www-data -c "wp post list --post_type=page --name=$$slug --field=ID" 2>/dev/null)
            if [ -n "$$PID" ]; then
              su -s /bin/bash www-data -c "wp post meta update $$PID _wp_page_template $$tpl" 2>&1 | tail -1 || true
            fi
          done
          # Sposta tutti i prodotti orfani fuori da "Senza categoria"
          UNCAT_ID=$$(su -s /bin/bash www-data -c "wp term list product_cat --slug=uncategorized --field=term_id" 2>/dev/null)
          if [ -z "$$UNCAT_ID" ]; then
            UNCAT_ID=$$(su -s /bin/bash www-data -c "wp term list product_cat --slug=senza-categoria --field=term_id" 2>/dev/null)
          fi
          # Traduzione IT->EN/DE/FR: trigger manuale via /wp-admin/?lcgf_action=translate
          # (vedi functions.php). NON girare al boot per evitare blocchi apache.
          # Pulisci cache
          su -s /bin/bash www-data -c "wp cache flush" 2>&1 | tail -1 || true
          # disattiva + elimina plugin inutili
          for plug in jetpack mailpoet pinterest-for-woocommerce reddit-for-woocommerce snapchat-for-woocommerce woocommerce-payments google-listings-and-ads connect-woocommerce-shipping packlink-pro-shipping akismet hello-dolly hello lcgf-bootstrap; do
            su -s /bin/bash www-data -c "wp plugin deactivate $$plug" 2>&1 | tail -1 || true
            su -s /bin/bash www-data -c "wp plugin delete $$plug" 2>&1 | tail -1 || true
          done
          echo "[lcgf-fixes] done"
        ) &
        exec docker-entrypoint.sh apache2-foreground
    environment:
      SERVICE_FQDN_WORDPRESS_80: /
      LCGF_FORCE_SYNC: "1"
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: lcgf_
      WORDPRESS_DEBUG: ${WP_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME:-http://localhost:8080}');
        define('WP_SITEURL', '${WP_SITEURL:-http://localhost:8080}');
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_POST_REVISIONS', 5);
        define('DISALLOW_FILE_EDIT', true);
        define('FORCE_SSL_ADMIN', ${WP_FORCE_SSL:-false});
        define('AUTOMATIC_UPDATER_DISABLED', false);
    volumes:
      - wp_data:/var/www/html
    # NOTA: i bind ./wp-content/* NON funzionano sotto Coolify perché collidono
    # col named volume wp_data che monta /var/www/html. I file di tema e
    # mu-plugins vengono scaricati dal repo GitHub all'avvio (vedi command).
    networks:
      - lcgf_net

  # Phpmyadmin opzionale (solo dev locale, NON esporre in produzione)
  phpmyadmin:
    image: phpmyadmin:5
    container_name: lcgf_pma
    restart: unless-stopped
    profiles: ["dev"]
    expose:
      - "80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 256M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lcgf_net

volumes:
  db_data:
  wp_data:

networks:
  lcgf_net:
    driver: bridge
