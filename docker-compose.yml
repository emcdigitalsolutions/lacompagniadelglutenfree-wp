services:
  db:
    image: mysql:8.0
    container_name: lcgf_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lcgf_net

  wordpress:
    image: wordpress:6.6-php8.2-apache
    container_name: lcgf_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    environment:
      SERVICE_FQDN_WORDPRESS_80: /
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: lcgf_
      WORDPRESS_DEBUG: ${WP_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME:-http://localhost:8080}');
        define('WP_SITEURL', '${WP_SITEURL:-http://localhost:8080}');
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_POST_REVISIONS', 5);
        define('DISALLOW_FILE_EDIT', true);
        define('FORCE_SSL_ADMIN', ${WP_FORCE_SSL:-false});
        define('AUTOMATIC_UPDATER_DISABLED', false);
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/lcgf-child:/var/www/html/wp-content/themes/lcgf-child
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    # uploads NON bind-mounted: vivono nel named volume wp_data così
    # www-data nel container ha permessi corretti di scrittura.
    networks:
      - lcgf_net

  # Phpmyadmin opzionale (solo dev locale, NON esporre in produzione)
  phpmyadmin:
    image: phpmyadmin:5
    container_name: lcgf_pma
    restart: unless-stopped
    profiles: ["dev"]
    expose:
      - "80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 256M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lcgf_net

volumes:
  db_data:
  wp_data:

networks:
  lcgf_net:
    driver: bridge
