services:
  db:
    image: mysql:8.0
    container_name: lcgf_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lcgf_net

  wordpress:
    image: wordpress:6.6-php8.2-apache
    container_name: lcgf_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    # Setup completo all'avvio (i bind ./wp-content nested non si propagano sotto Coolify):
    # 1. Config PHP per upload grandi (128MB)
    # 2. Scarica tema child + mu-plugins dal repo GitHub pubblico
    # 3. Fix permessi www-data
    command:
      - bash
      - -c
      - |
        set -e
        # PHP config
        cat > /usr/local/etc/php/conf.d/uploads.ini <<'PHPEOF'
        file_uploads = On
        memory_limit = 512M
        upload_max_filesize = 128M
        post_max_size = 128M
        max_execution_time = 300
        max_input_time = 300
        max_input_vars = 5000
        PHPEOF
        # Scarica tema + mu-plugins dal repo GitHub al boot
        if [ ! -f /var/www/html/wp-content/themes/lcgf-child/style.css ] || [ "${LCGF_FORCE_SYNC:-0}" = "1" ]; then
          apt-get update -qq && apt-get install -y -qq wget
          cd /tmp
          wget -q https://github.com/emcdigitalsolutions/lacompagniadelglutenfree-wp/archive/refs/heads/master.tar.gz -O repo.tar.gz
          tar xzf repo.tar.gz
          mkdir -p /var/www/html/wp-content/themes /var/www/html/wp-content/mu-plugins
          rm -rf /var/www/html/wp-content/themes/lcgf-child
          cp -r lacompagniadelglutenfree-wp-master/wp-content/themes/lcgf-child /var/www/html/wp-content/themes/
          cp -r lacompagniadelglutenfree-wp-master/wp-content/mu-plugins/. /var/www/html/wp-content/mu-plugins/ 2>/dev/null || true
          rm -rf /tmp/repo.tar.gz /tmp/lacompagniadelglutenfree-wp-master
        fi
        # Permessi
        mkdir -p /var/www/html/wp-content/uploads
        chown -R www-data:www-data /var/www/html/wp-content
        chmod -R u+rwX,g+rwX /var/www/html/wp-content
        exec docker-entrypoint.sh apache2-foreground
    environment:
      SERVICE_FQDN_WORDPRESS_80: /
      LCGF_FORCE_SYNC: "1"
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: lcgf_
      WORDPRESS_DEBUG: ${WP_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME:-http://localhost:8080}');
        define('WP_SITEURL', '${WP_SITEURL:-http://localhost:8080}');
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_POST_REVISIONS', 5);
        define('DISALLOW_FILE_EDIT', true);
        define('FORCE_SSL_ADMIN', ${WP_FORCE_SSL:-false});
        define('AUTOMATIC_UPDATER_DISABLED', false);
    volumes:
      - wp_data:/var/www/html
    # NOTA: i bind ./wp-content/* NON funzionano sotto Coolify perché collidono
    # col named volume wp_data che monta /var/www/html. I file di tema e
    # mu-plugins vengono scaricati dal repo GitHub all'avvio (vedi command).
    networks:
      - lcgf_net

  # Phpmyadmin opzionale (solo dev locale, NON esporre in produzione)
  phpmyadmin:
    image: phpmyadmin:5
    container_name: lcgf_pma
    restart: unless-stopped
    profiles: ["dev"]
    expose:
      - "80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 256M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lcgf_net

volumes:
  db_data:
  wp_data:

networks:
  lcgf_net:
    driver: bridge
